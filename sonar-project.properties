# SonarQube / SonarCloud project configuration
# Run: sonar-scanner -Dproject.settings=sonar-project.properties
# Coverage XML is generated by: uv run pytest --cov=py_prompt_versioner --cov-report=xml

sonar.projectKey=py-prompt-versioner
sonar.projectName=Py Prompt Versioner
sonar.projectVersion=0.1.0

# Source and test directories
sonar.sources=src
sonar.tests=tests

# Python version
sonar.python.version=3.9

# Coverage report (produced by pytest-cov --cov-report=xml)
sonar.python.coverage.reportPaths=coverage.xml

# Encoding
sonar.sourceEncoding=UTF-8

# Exclusions
sonar.exclusions=**/__pycache__/**,**/*.pyc,.venv/**
